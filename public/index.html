<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynTests</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #eee;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }
    header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid #1f1f1f;
    }
    header h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.05em; }
    header h1 span { color: #7c6cfc; }
    header p { font-size: 13px; color: #555; margin-top: 6px; }
    main { padding: 32px 40px; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #444;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s, background 0.2s;
    }
    .card:hover { background: #161616; border-color: #7c6cfc; }
    .card-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
    .card-meta { font-size: 12px; color: #555; }
    .card-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1a1a2e;
      color: #7c6cfc;
      border: 1px solid #2a2060;
      margin-top: 12px;
      letter-spacing: 0.04em;
    }
    @media (max-width: 640px) {
      header { padding: 20px; }
      main { padding: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Syn<span>Tests</span></h1>
    <p>Robot task video comparison sets</p>
  </header>
  <main>
    <div class="section-title">Test Sets</div>
    <div class="grid">
      <a class="card" href="/tests/umi_sweater_1/">
        <div class="card-title">UMI Sweater 1</div>
        <div class="card-meta">4 videos · 15s · 1 original, 3 generated</div>
        <div class="card-badge">umi_sweater_1</div>
      </a>
      <a class="card" href="/tests/umi_sweater_2/">
        <div class="card-title">UMI Sweater 2</div>
        <div class="card-meta">4 videos · 15s · 1 original, 3 generated</div>
        <div class="card-badge">umi_sweater_2</div>
      </a>
      <!-- ADD NEW TEST CARDS HERE -->
    </div>
  </main>
</body>
</html>
