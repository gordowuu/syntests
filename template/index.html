<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CHANGE: update title -->
  <title>SynTests — MY TEST NAME</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0d0d0d; color: #eee; font-family: system-ui, sans-serif; overflow-y: auto; }
    .layout { display: flex; flex-direction: column; }
    header { padding: 10px 24px; border-bottom: 1px solid #1f1f1f; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; color: #fff; }
    header h1 span { color: #7c6cfc; }
    .controls { display: flex; gap: 8px; align-items: center; }
    button { background: #1e1e1e; border: 1px solid #333; color: #eee; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.15s; }
    button:hover { background: #2a2a2a; }
    button.primary { background: #7c6cfc; border-color: #7c6cfc; color: #fff; }
    button.primary:hover { background: #6a5ae0; }
    .sync-status { font-size: 11px; color: #555; padding: 3px 10px; background: #151515; border: 1px solid #222; border-radius: 20px; }
    .sync-status.synced { color: #4caf80; border-color: #1a3a2a; background: #0f1f18; }
    main { padding: 16px 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; height: 100%; }
    .video-card { background: #111; border: 1px solid #1f1f1f; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .video-card video { flex: 1; width: 100%; min-height: 0; display: block; background: #0d0d0d; object-fit: contain; }
    .video-footer { padding: 6px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-top: 1px solid #1a1a1a; }
    .label { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge.original  { background: #1a3040; color: #5ab0d8; border: 1px solid #1e4a60; }
    .badge.generated { background: #2a1a40; color: #a07cf0; border: 1px solid #3a2060; }
    .video-time { font-size: 11px; color: #555; font-variant-numeric: tabular-nums; }
    @media (max-width: 640px) {
      header { padding: 8px 14px; flex-wrap: wrap; gap: 8px; }
      header h1 { font-size: 14px; }
      .controls { gap: 6px; }
      button { padding: 5px 10px; font-size: 11px; }
      .sync-status { font-size: 10px; }
      main { padding: 10px 12px; }
      .grid { grid-template-columns: 1fr; }
    }  </style>
</head>
<body>
<div class="layout">
  <header>
    <!-- CHANGE: update test name in breadcrumb -->
    <h1><a href="/" style="color:inherit;text-decoration:none">Syn<span>Tests</span></a> <span style="color:#333;font-weight:300">/ my-test-name</span></h1>
    <div class="controls">
      <div class="sync-status" id="sync-status">● not synced</div>
      <button onclick="restartAll()">⏮ Restart</button>
      <button onclick="pauseAll()">⏸ Pause</button>
      <button onclick="playAll()" class="primary">▶ Play All</button>
    </div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
  </main>
</div>

<script>
  // ─────────────────────────────────────────────
  // EDIT THIS SECTION to configure your test set
  // ─────────────────────────────────────────────
  const videos = [
    { file: 'original.mp4',    type: 'original'  },
    { file: 'generated_1.mp4', type: 'generated' },
    { file: 'generated_2.mp4', type: 'generated' },
    { file: 'generated_3.mp4', type: 'generated' },
    // Add or remove entries as needed.
    // 'type' controls badge color: 'original' (blue) or 'generated' (purple)
  ];
  // ─────────────────────────────────────────────

  const els = [];
  const grid = document.getElementById('grid');

  // Auto-adjust grid columns based on video count
  const cols = videos.length <= 2 ? videos.length : 2;
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${Math.ceil(videos.length / cols)}, 1fr)`;

  videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <video id="v${i}" src="${v.file}" playsinline muted preload="auto"></video>
      <div class="video-footer">
        <div class="label"><span class="badge ${v.type}">${v.type}</span></div>
        <div class="video-time" id="t${i}">0:00</div>
      </div>
    `;
    grid.appendChild(card);
    els.push(document.getElementById(`v${i}`));
  });

  setInterval(() => {
    els.forEach((v, i) => {
      const m = Math.floor(v.currentTime / 60);
      const s = Math.floor(v.currentTime % 60).toString().padStart(2, '0');
      document.getElementById(`t${i}`).textContent = `${m}:${s}`;
    });
  }, 100);

  setInterval(() => {
    if (els[0].paused) return;
    const times = els.map(v => v.currentTime);
    const drift = Math.max(...times) - Math.min(...times);
    const status = document.getElementById('sync-status');
    status.textContent = drift < 0.25 ? '● synced' : '● drifted';
    status.className = 'sync-status' + (drift < 0.25 ? ' synced' : '');
  }, 800);

  function playAll() { const t = els[0].currentTime; els.forEach(v => { v.currentTime = t; v.play(); }); }
  function pauseAll() { els.forEach(v => v.pause()); document.getElementById('sync-status').textContent = '● paused'; document.getElementById('sync-status').className = 'sync-status'; }
  function restartAll() { els.forEach(v => { v.currentTime = 0; v.play(); }); }

  let isSyncing = false;
  els.forEach(v => {
    v.addEventListener('seeked', () => {
      if (isSyncing) return;
      isSyncing = true;
      const t = v.currentTime;
      els.forEach(o => { if (o !== v) o.currentTime = t; });
      setTimeout(() => { isSyncing = false; }, 150);
    });
  });

  els[0].addEventListener('ended', () => restartAll());
  window.addEventListener('load', () => els.forEach(v => v.play().catch(() => {})));
</script>
</body>
</html>
